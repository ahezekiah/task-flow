services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: naeomei
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow_pro
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naeomei -d taskflow_pro"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./task-flow/server
    ports:
      - "5050:5050"
    volumes:
      - ./task-flow/server:/app
      - ./task-flow/server/uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://naeomei:postgres@postgres:5432/taskflow_pro?schema=public
      JWT_SECRET: taskflow-pro-super-secret-key-change-in-production
      PORT: 5050
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./task-flow
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
